<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainrot Vault</title>

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1022;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
    }

    img.logo {
      width: 120px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: #1c2444;
      padding: 20px;
      border-radius: 12px;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: orange;
      color: black;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <h1>Brainrot Vault</h1>
</header>

<div class="grid">
  <div class="card">Commun</div>
  <div class="card">Rare</div>
  <div class="card">Épique</div>
  <div class="card">Mythique</div>
  <div class="card">Légendaire</div>
</div>

<button onclick="alert('Fonction à venir')">Ajouter Brainrot</button>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
